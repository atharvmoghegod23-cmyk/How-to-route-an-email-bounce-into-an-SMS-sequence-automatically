<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Share your feedback on the email bounce to SMS automation platform. We'd love to hear your thoughts!">
  <title>Feedback - Email Bounce to SMS Automation</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h2>EmailBounce→SMS</h2>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="why.html">Why</a></li>
        <li><a href="how.html">How</a></li>
        <li><a href="code.html">Code</a></li>
        <li><a href="summary.html">Summary</a></li>
        <li><a href="feedback.html">Feedback</a></li>
      </ul>
    </div>
  </nav>

  <section class="implementation">
    <div class="container">
      <h1>We'd Love Your Feedback</h1>
      <p>Help us improve the email bounce to SMS automation platform. Share your thoughts, suggestions, and experiences.</p>
    </div>
  </section>

  <main class="content">
    <div class="container">
      <form id="feedbackForm">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="message">Feedback:</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="btn">Submit Feedback</button>
      </form>

      <p id="feedbackResponse" style="margin-top:20px; font-weight:bold;"></p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Email Bounce to SMS Automation. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
